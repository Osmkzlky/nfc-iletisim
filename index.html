<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osman Kızılkaya - Dijital Kartvizit</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 320px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            background-color: #e1e4e8;
            color: #24292e;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px auto;
        }
        h1 { font-size: 24px; margin: 0 0 5px 0; color: #333; }
        h2 { font-size: 14px; margin: 0 0 5px 0; color: #666; font-weight: normal; }
        p { font-size: 14px; color: #888; margin: 0 0 30px 0; font-weight: 500; }
        .btn {
            display: block;
            padding: 14px 24px;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn:active { background-color: #005bb5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">OK</div>
        <h1>Osman Kızılkaya</h1>
        <h2>Software Engineer & Co-Founder</h2>
        <p>Coriolis Core</p>
        
        <!-- Buton artık doğrudan bir JavaScript fonksiyonunu tetikliyor -->
        <button onclick="downloadVCard()" class="btn">Kişilere Ekle</button>
    </div>

    <script>
        function downloadVCard() {
            // vCard verisi, satır atlamaları (\r\n) korunarak tam uyumlu hale getirildi
            var vcardText = 
                "BEGIN:VCARD\r\n" +
                "VERSION:3.0\r\n" +
                "N:Kızılkaya;Osman;;;\r\n" +
                "FN:Osman Kızılkaya\r\n" +
                "ORG:Coriolis Core\r\n" +
                "TITLE:Software Engineer & Co-Founder\r\n" +
                "TEL;TYPE=CELL:05443554253\r\n" +
                "EMAIL:osdeveloperman@gmail.com\r\n" +
                "URL:https://linkedin.com/in/osmankizilkaya3423\r\n" +
                "URL:https://youtube.com/@osdeveloperman\r\n" +
                "END:VCARD";

            // Veriyi gerçek bir dosya formatına (Blob) dönüştürüyoruz
            var blob = new Blob([vcardText], { type: 'text/vcard;charset=utf-8' });
            var url = window.URL.createObjectURL(blob);
            
            // Geçici bir indirme linki oluşturup tetikliyoruz
            var a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Osman_Kizilkaya.vcf';
            
            document.body.appendChild(a);
            a.click();
            
            // İşlem bittikten sonra temizlik yapıyoruz
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
