<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osman Kızılkaya - Dijital Kartvizit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #3b82f6, #4f46e5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 3D KARTVİZİT ANİMASYON ALANI */
        .card-3d-scene {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 16 / 9; /* Kartvizit oranı */
            margin: 0 auto 30px auto;
            perspective: 1000px; /* 3D derinlik algısı */
        }

        .card-3d-object {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* 8 saniyede bir tam tur dönecek şekilde ayarlandı */
            animation: flipCard 8s infinite ease-in-out;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Arka yüzü gizler */
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Dönüş animasyonu keyframeleri */
        @keyframes flipCard {
            0%, 35% { transform: rotateY(0deg); }      /* Ön yüz bekleme */
            50%, 85% { transform: rotateY(180deg); }   /* Arka yüz bekleme */
            100% { transform: rotateY(360deg); }       /* Başa dönüş */
        }

        h1 { 
            font-size: 26px; 
            font-weight: 600; 
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        h2 { 
            font-size: 15px; 
            font-weight: 400; 
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        .company-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #93c5fd;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.5);
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="card-container">
        
        <!-- 3D Dönen Kartvizit Animasyonu -->
        <div class="card-3d-scene">
            <div class="card-3d-object">
                <div class="card-face card-front">
                    <img src="20.png" alt="Coriolis Core Ön Yüz">
                </div>
                <div class="card-face card-back">
                    <img src="21.jpg" alt="Coriolis Core Arka Yüz">
                </div>
            </div>
        </div>

        <h1>Osman Kızılkaya</h1>
        <h2>Software Engineer & Co-Founder</h2>
        <div class="company-badge">Coriolis Core</div>
        
        <button onclick="downloadVCard()" class="btn">Rehbere Ekle</button>
    </div>
    
    <div class="footer">NFC Dijital Kartvizit</div>

    <script>
        function downloadVCard() {
            var vcardText = 
                "BEGIN:VCARD\r\n" +
                "VERSION:3.0\r\n" +
                "N:Kızılkaya;Osman;;;\r\n" +
                "FN:Osman Kızılkaya\r\n" +
                "ORG:Coriolis Core\r\n" +
                "TITLE:Software Engineer & Co-Founder\r\n" +
                "TEL;TYPE=CELL:05443554253\r\n" +
                "EMAIL:osdeveloperman@gmail.com\r\n" +
                "item1.URL:https://linkedin.com/in/osmankizilkaya3423\r\n" +
                "item1.X-ABLabel:LinkedIn\r\n" +
                "item2.URL:https://youtube.com/@osdeveloperman\r\n" +
                "item2.X-ABLabel:youtube\r\n" +
                "END:VCARD";

            var blob = new Blob([vcardText], { type: 'text/vcard;charset=utf-8' });
            var url = window.URL.createObjectURL(blob);
            
            var a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Osman_Kizilkaya.vcf';
            
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
