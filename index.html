<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osman Kızılkaya - Dijital Kartvizit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#090c11;
    --surface:#121821;
    --surface-2:#1a212c;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --text:#eef1f5;
    --text-dim:#8b95a5;
    --text-faint:#5b6577;
    --core:#ff7a45;
    --core-soft:rgba(255,122,69,0.16);
    --coriolis:#49c6d6;
    --coriolis-soft:rgba(73,198,214,0.14);
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 22% 18%, var(--coriolis-soft), transparent 42%),
      radial-gradient(circle at 78% 82%, var(--core-soft), transparent 42%),
      var(--bg);
    position:relative;
    padding:24px;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events:none;
    mask-image: radial-gradient(circle at 50% 45%, black, transparent 75%);
  }

  .card{
    position:relative;
    z-index:1;
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid var(--border);
    border-radius:26px;
    padding:36px 30px 30px;
    width:100%;
    max-width:340px;
    text-align:center;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.02);
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    color:var(--text-faint);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:26px;
  }
  .eyebrow::before, .eyebrow::after{
    content:'';
    height:1px;
    width:22px;
    background:var(--border-strong);
  }

  .card-flip-scene{
    width:230px;
    aspect-ratio: 3281 / 1875;
    margin:0 auto 24px;
    perspective:900px;
    border-radius:11px;
  }
  .card-flip-scene:focus-visible{
    outline:2px solid var(--coriolis);
    outline-offset:4px;
  }

  .card-flip{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    animation: cardflip 7s cubic-bezier(.65,0,.35,1) infinite;
    border-radius:11px;
    box-shadow:
      0 0 0 1px var(--border-strong),
      0 14px 30px -12px rgba(0,0,0,0.7),
      0 0 22px -6px rgba(73,198,214,0.35);
  }

  .card-flip-scene:hover .card-flip,
  .card-flip-scene:focus-within .card-flip{
    animation-play-state:paused;
  }

  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:11px;
    overflow:hidden;
    background:#000;
  }
  .card-face img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
  }
  .card-face.back{
    transform:rotateY(180deg);
  }

  @keyframes cardflip{
    0%, 38%   { transform:rotateY(0deg); }
    50%, 88%  { transform:rotateY(180deg); }
    100%      { transform:rotateY(360deg); }
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:23px;
    font-weight:600;
    color:var(--text);
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }

  .role-line{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:0 0 4px;
  }

  .org-line{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--coriolis);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    margin:0 0 30px;
  }
  .org-line::before{
    content:'';
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--core);
    box-shadow:0 0 6px rgba(255,122,69,0.8);
    flex:none;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:14px 20px;
    background:linear-gradient(135deg, var(--core), #ff9662);
    color:#161006;
    text-decoration:none;
    border-radius:13px;
    font-weight:600;
    font-size:15.5px;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    border:none;
    box-shadow:0 10px 24px -8px rgba(255,122,69,0.55);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover{ box-shadow:0 12px 28px -6px rgba(255,122,69,0.65); }
  .btn:active{ transform:translateY(1px) scale(0.99); }
  .btn:focus-visible{ outline:2px solid var(--coriolis); outline-offset:3px; }

  .caption{
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:12px 0 22px;
  }

  .links{
    display:flex;
    gap:10px;
    justify-content:center;
  }

  .icon-link{
    display:flex;
    align-items:center;
    justify-content:center;
    width:44px;
    height:44px;
    border-radius:12px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    color:var(--text-dim);
    text-decoration:none;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .icon-link:hover{
    border-color:var(--coriolis);
    color:var(--coriolis);
    background:rgba(73,198,214,0.08);
  }
  .icon-link:focus-visible{ outline:2px solid var(--coriolis); outline-offset:2px; }
  .icon-link svg{ width:19px; height:19px; }

  @media (prefers-reduced-motion: reduce){
    .card-flip{ animation:none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Dijital Kartvizit</div>

    <div class="card-flip-scene" tabindex="0" aria-label="Coriolis Core kartvizit, ön ve arka yüz dönüyor">
      <div class="card-flip">
        <div class="card-face front">
          <img src="20.png" alt="Kartvizit ön yüzü: Osman Kızılkaya, Software Engineer & Co-Founder">
        </div>
        <div class="card-face back">
          <img src="21.png" alt="Kartvizit arka yüzü: Coriolis Core logosu">
        </div>
      </div>
    </div>

    <h1>Osman Kızılkaya</h1>
    <p class="role-line">Software Engineer &middot; Co-Founder</p>
    <p class="org-line">Coriolis Core</p>

    <button onclick="downloadVCard()" class="btn">
      Kişilere Ekle
    </button>
    <p class="caption">iOS &amp; Android ile uyumlu vCard</p>

    <div class="links">
      <a class="icon-link" href="https://linkedin.com/in/osmankizilkaya3423" target="_blank" rel="noopener" aria-label="LinkedIn profili">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="9" width="4" height="12" rx="0.5" fill="currentColor"/>
          <circle cx="5" cy="4.5" r="2.3" fill="currentColor"/>
          <path d="M11 9h4v2.2c.9-1.5 2.3-2.5 4.4-2.5 3.3 0 4.6 2.1 4.6 5.6V21h-4v-6.1c0-1.6-.6-2.7-2-2.7-1.1 0-1.8.8-2.1 1.5-.1.3-.1.6-.1 1V21h-4V9z" fill="currentColor"/>
        </svg>
      </a>
      <a class="icon-link" href="https://youtube.com/@osdeveloperman" target="_blank" rel="noopener" aria-label="YouTube kanalı">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2.5" y="6" width="19" height="12" rx="3.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M10.5 9.3v5.4l4.8-2.7-4.8-2.7z" fill="currentColor"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    function downloadVCard() {
      var vcardText =
        "BEGIN:VCARD\r\n" +
        "VERSION:3.0\r\n" +
        "N:Kızılkaya;Osman;;;\r\n" +
        "FN:Osman Kızılkaya\r\n" +
        "ORG:Coriolis Core\r\n" +
        "TITLE:Software Engineer & Co-Founder\r\n" +
        "TEL;TYPE=CELL:05443554253\r\n" +
        "EMAIL:osdeveloperman@gmail.com\r\n" +
        "item1.URL:https://linkedin.com/in/osmankizilkaya3423\r\n" +
        "item1.X-ABLabel:LinkedIn\r\n" +
        "item2.URL:https://youtube.com/@osdeveloperman\r\n" +
        "item2.X-ABLabel:youtube\r\n" +
        "END:VCARD";
      var blob = new Blob([vcardText], { type: 'text/vcard;charset=utf-8' });
      var url = window.URL.createObjectURL(blob);

      var a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = 'Osman_Kizilkaya.vcf';

      document.body.appendChild(a);
      a.click();

      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
