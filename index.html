<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osman Kızılkaya - Dijital Kartvizit</title>
    <!-- Modern ve şık bir yazı tipi için Google Fonts eklendi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Dinamik, hareketli, teknolojik bir arka plan */
            background: linear-gradient(-45deg, #0f172a, #1e293b, #3b82f6, #4f46e5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism (Buzlu Cam) Efekti */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            /* Yumuşak bir giriş animasyonu */
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profil Fotoğrafı Alanı (İleride IMG etiketiyle de değiştirebilirsin) */
        .avatar {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #ffffff;
            font-size: 42px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 25px auto;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        h1 { 
            font-size: 26px; 
            font-weight: 600; 
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        h2 { 
            font-size: 15px; 
            font-weight: 400; 
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        /* Şirket ismini vurgulamak için özel etiket */
        .company-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #93c5fd;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.5);
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* En alta ufak bir detay (İsteğe bağlı) */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">OK</div>
        <h1>Osman Kızılkaya</h1>
        <h2>Software Engineer & Co-Founder</h2>
        <div class="company-badge">Coriolis Core</div>
        
        <button onclick="downloadVCard()" class="btn">Rehbere Ekle</button>
    </div>
    
    <div class="footer">NFC Dijital Kartvizit</div>

    <script>
        function downloadVCard() {
            var vcardText = 
                "BEGIN:VCARD\r\n" +
                "VERSION:3.0\r\n" +
                "N:Kızılkaya;Osman;;;\r\n" +
                "FN:Osman Kızılkaya\r\n" +
                "ORG:Coriolis Core\r\n" +
                "TITLE:Software Engineer & Co-Founder\r\n" +
                "TEL;TYPE=CELL:05443554253\r\n" +
                "EMAIL:osdeveloperman@gmail.com\r\n" +
                "item1.URL:https://linkedin.com/in/osmankizilkaya3423\r\n" +
                "item1.X-ABLabel:LinkedIn\r\n" +
                "item2.URL:https://youtube.com/@osdeveloperman\r\n" +
                "item2.X-ABLabel:youtube\r\n" +
                "END:VCARD";

            var blob = new Blob([vcardText], { type: 'text/vcard;charset=utf-8' });
            var url = window.URL.createObjectURL(blob);
            
            var a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Osman_Kizilkaya.vcf';
            
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
